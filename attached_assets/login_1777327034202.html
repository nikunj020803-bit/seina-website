<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Log in — seina</title>
<meta name="description" content="Log in to your seina workspace." />

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&family=VT323&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">

<style>
  /* Page-specific layout for the login page */
  .login-wrap {
    min-height: calc(100vh - 72px);
    display: grid;
    place-items: center;
    padding: 64px 24px;
    background:
      radial-gradient(circle at 20% 10%, rgba(166,227,240,0.35) 0, transparent 40%),
      radial-gradient(circle at 80% 90%, rgba(191,235,95,0.30) 0, transparent 40%),
      var(--surface-50);
  }
  .login-card {
    width: 100%;
    max-width: 440px;
    background: var(--surface-white);
    border: 1px solid var(--line);
    border-radius: 14px;
    padding: 40px;
    box-shadow: 0 1px 0 rgba(0,0,0,0.02);
  }
  .login-card h1 {
    font-size: 32px;
    font-weight: 500;
    letter-spacing: -0.02em;
    margin-bottom: 8px;
  }
  .login-card .sub {
    color: var(--ink-body);
    margin-bottom: 32px;
    font-size: 15px;
  }
  .login-meta {
    display: flex; justify-content: space-between; align-items: center;
    margin: -8px 0 8px;
    font-size: 13px;
  }
  .login-meta a {
    font-family: var(--font-mono);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--brand-blue);
  }
  .login-meta a:hover { color: var(--accent-orange); }
  .login-foot {
    margin-top: 28px;
    padding-top: 24px;
    border-top: 1px solid var(--line);
    text-align: center;
    font-size: 14px;
    color: var(--ink-body);
  }
  .login-foot a {
    color: var(--ink-primary);
    font-weight: 600;
    text-decoration: underline;
    text-underline-offset: 3px;
  }
  .login-foot a:hover { color: var(--accent-orange); }
  @media (max-width: 480px) {
    .login-card { padding: 28px 22px; }
  }
</style>
</head>

<body>

<!-- =========================================================
     NAV
========================================================== -->
<nav class="nav" id="nav">
  <div class="nav__inner">
    <a href="index.html" class="brand">seina</a>
    <div class="nav__links">
      <a href="product.html">Product</a>
      <a href="index.html#how">How it works</a>
    </div>
    <div class="nav__cta">
      <a href="book-demo.html" class="btn btn--primary">Book a Demo</a>
    </div>
  </div>
</nav>

<!-- =========================================================
     LOGIN
========================================================== -->
<main class="login-wrap">
  <div class="login-card">
    <span class="label-mono" style="margin-bottom:18px;"><i class="pin"></i> Welcome back</span>
    <h1>Log in to seina</h1>
    <p class="sub">Sign in with the email you registered with.</p>

    <form class="form" id="loginForm" novalidate>
      <div class="form__field">
        <label for="email">Work email</label>
        <input id="email" name="email" type="email" placeholder="jane@company.com" required autocomplete="email" />
      </div>

      <div class="form__field">
        <label for="password">Password</label>
        <input id="password" name="password" type="password" placeholder="••••••••" required autocomplete="current-password" />
        <div class="login-meta">
          <span></span>
          <a href="#">Forgot password?</a>
        </div>
      </div>

      <div class="form__success" id="formSuccess">
        Authenticated. Redirecting to your workspace…
      </div>

      <button type="submit" class="btn btn--primary form__submit">
        Sign in <span class="arrow">→</span>
      </button>
    </form>

    <div class="login-foot">
      New to seina? <a href="book-demo.html">Request a demo</a>
    </div>
  </div>
</main>

<!-- Floating chat bubble -->
<a href="#" class="fab" aria-label="Chat with seina">s</a>

<script>
  // Sticky-nav border on scroll
  const nav = document.getElementById('nav');
  const onScroll = () => nav.classList.toggle('is-scrolled', window.scrollY > 8);
  window.addEventListener('scroll', onScroll, { passive: true }); onScroll();

  // Login handler — visual confirmation only (wire to a backend later)
  const form = document.getElementById('loginForm');
  const success = document.getElementById('formSuccess');
  form.addEventListener('submit', (e) => {
    e.preventDefault();
    if (!form.checkValidity()) { form.reportValidity(); return; }
    success.classList.add('is-shown');
    form.querySelector('button[type="submit"]').textContent = 'Signing in…';
    form.querySelectorAll('input, button').forEach(el => el.disabled = true);
  });
</script>

</body>
</html>
